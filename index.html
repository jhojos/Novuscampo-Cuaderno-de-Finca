/* ============================================================
   Novuscampo — Cuaderno de Finca
   Sistema de diseño idéntico al marketplace.
   "Editorial · sobrio · llanero. Papel, tinta, terracota."
   ============================================================ */

:root {
  /* Superficies (papel) */
  --paper: #f4ecdb;
  --paper-2: #ece1c6;
  --paper-3: #e2d5b3;
  --paper-card: #fbf6ea;
  /* Tinta */
  --ink: #1c1814;
  --ink-1: #3a3127;
  --ink-2: #6b5f4e;
  --ink-3: #968a76;
  --ink-4: #b8ad97;
  /* Líneas */
  --rule: #d4c6a4;
  --rule-soft: #e1d4b3;
  /* Marca */
  --terra: #8b3a2c;
  --terra-deep: #5e2719;
  --terra-tint: #d8a99c;
  --terra-wash: #f3dcd2;
  /* Semánticos */
  --olive: #5a6440;
  --olive-wash: #d8dcc1;
  --amber: #a67220;
  --amber-wash: #f0e1bf;
  --crimson: #8a2a26;
  --crimson-wash: #f0d8d4;
  /* Tipografía */
  --serif: "Newsreader", "Source Serif 4", Georgia, serif;
  --sans: "DM Sans", ui-sans-serif, system-ui, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", monospace;
  /* Radios */
  --r-xs: 4px;
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0; padding: 0;
  height: 100%;
  background: var(--paper);
  overscroll-behavior: none;
}

#root { height: 100%; }

body {
  font-family: var(--sans);
  color: var(--ink);
  /* Cuerpo 16px+ por reglas de campo (pleno sol, baja alfabetización) */
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
}

/* ---- Tipografía base ---- */
.cf-h1 { font-family: var(--serif); font-weight: 500; font-size: 28px; line-height: 1.1; letter-spacing: -0.01em; color: var(--ink); margin: 0; }
.cf-h2 { font-family: var(--serif); font-weight: 500; font-size: 22px; line-height: 1.15; color: var(--ink); margin: 0; }
.cf-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-2); }
.cf-body { font-family: var(--sans); font-size: 16px; line-height: 1.5; color: var(--ink-1); }
.cf-meta { font-family: var(--mono); font-size: 12px; color: var(--ink-2); letter-spacing: 0.02em; }
.cf-num { font-family: var(--mono); font-feature-settings: "tnum"; }
.cf-wordmark { font-family: var(--serif); font-weight: 500; font-style: italic; letter-spacing: -0.01em; }

/* ---- Botones (mínimo 60px alto por reglas de campo) ---- */
.cf-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; min-height: 60px; padding: 0 20px;
  background: var(--terra); color: var(--paper);
  border: none; cursor: pointer;
  font-family: var(--sans); font-weight: 600; font-size: 18px;
  border-radius: var(--r-sm); letter-spacing: 0.01em;
}
.cf-btn:active { opacity: 0.85; }
.cf-btn--ink { background: var(--ink); }
.cf-btn--ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--rule); }
.cf-btn--olive { background: var(--olive); }
.cf-btn--crimson { background: var(--crimson); }
.cf-btn--sm { min-height: 48px; font-size: 16px; width: auto; padding: 0 16px; }

/* ---- Inputs (altos, legibles) ---- */
.cf-input, .cf-select, .cf-textarea {
  width: 100%; min-height: 56px; padding: 0 16px;
  background: var(--paper-card); border: 1.5px solid var(--rule);
  border-radius: var(--r-sm);
  font-family: var(--sans); font-size: 18px; color: var(--ink);
  box-sizing: border-box;
}
.cf-textarea { padding: 14px 16px; min-height: 90px; line-height: 1.5; resize: vertical; }
.cf-input:focus, .cf-select:focus, .cf-textarea:focus { outline: none; border-color: var(--terra); }
.cf-input::placeholder, .cf-textarea::placeholder { color: var(--ink-3); }
.cf-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-2); display: block; margin-bottom: 8px; }

/* ---- Tarjetas ---- */
.cf-card { background: var(--paper-card); border: 1px solid var(--rule-soft); border-radius: var(--r-md); }

/* ---- Chips de estado ---- */
.cf-chip {
  display: inline-flex; align-items: center; gap: 5px;
  height: 26px; padding: 0 10px; border-radius: 999px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em;
  white-space: nowrap; font-weight: 500;
}
.cf-chip--olive { background: var(--olive-wash); color: var(--olive); }
.cf-chip--amber { background: var(--amber-wash); color: var(--amber); }
.cf-chip--crimson { background: var(--crimson-wash); color: var(--crimson); }
.cf-chip--terra { background: var(--terra-wash); color: var(--terra-deep); }
.cf-chip--ink { background: var(--paper-2); color: var(--ink-2); }

/* ---- Marca / monograma ---- */
.cf-mark { display: inline-flex; align-items: center; justify-content: center; background: var(--terra); color: var(--paper); font-family: var(--serif); font-style: italic; font-weight: 500; border-radius: 3px; letter-spacing: -0.02em; overflow: hidden; }
.cf-mark img { width: 100%; height: 100%; object-fit: cover; }

/* ---- Separador rombo ---- */
.cf-diamond { color: var(--terra); }

/* ---- Líneas ---- */
.cf-rule { height: 1px; background: var(--rule-soft); width: 100%; border: none; margin: 0; }
.cf-rule-dashed { height: 0; border: none; border-top: 1px dashed var(--rule); width: 100%; }

/* ---- Textura newsprint para cabeceras ---- */
.cf-newsprint {
  background-color: var(--paper);
  background-image: repeating-linear-gradient(0deg, transparent 0 3px, rgba(28,24,20,0.012) 3px 4px);
}

/* ---- Placeholder rayado ---- */
.cf-ph {
  background-color: var(--paper-2);
  background-image: repeating-linear-gradient(135deg, var(--paper-2) 0 6px, var(--paper-3) 6px 7px);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-3); font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.1em; text-transform: uppercase;
}

/* ============================================================
   LAYOUT — phone shell mobile-first
   ============================================================ */
.cf-app {
  max-width: 460px; margin: 0 auto;
  height: 100%; position: relative;
  display: flex; flex-direction: column;
  background: var(--paper);
  overflow: hidden;
}

/* Cabecera */
.cf-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(env(safe-area-inset-top, 0px) + 14px) 18px 12px;
  border-bottom: 1px solid var(--rule);
  background: var(--paper);
  flex-shrink: 0;
}
.cf-header-brand { display: inline-flex; align-items: center; gap: 8px; }

/* Área scrolleable */
.cf-scroll {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding-bottom: calc(96px + env(safe-area-inset-bottom, 0px));
}
.cf-scroll::-webkit-scrollbar { width: 0; }
.cf-scroll { scrollbar-width: none; }

/* Barra de navegación inferior */
.cf-tabbar {
  position: absolute; bottom: 0; left: 0; right: 0;
  display: flex; align-items: stretch;
  background: var(--paper-card);
  border-top: 1px solid var(--rule);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  flex-shrink: 0;
}
.cf-tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; min-height: 64px; padding: 8px 4px;
  background: transparent; border: none; cursor: pointer;
  font-family: var(--sans); font-size: 11px; color: var(--ink-3);
}
.cf-tab.active { color: var(--terra); }
.cf-tab svg { width: 22px; height: 22px; }

/* Estado vacío */
.cf-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 48px 32px; gap: 14px; color: var(--ink-3);
}

/* Modal / hoja inferior */
.cf-sheet-backdrop {
  position: fixed; inset: 0; background: rgba(28,24,20,0.5);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 100;
}
.cf-sheet {
  width: 100%; max-width: 460px; max-height: 92%;
  background: var(--paper); border-radius: var(--r-lg) var(--r-lg) 0 0;
  display: flex; flex-direction: column;
  animation: cf-slide-up 0.22s ease;
}
@keyframes cf-slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
.cf-sheet-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 18px 12px; border-bottom: 1px solid var(--rule); flex-shrink: 0;
}
.cf-sheet-body { padding: 18px; overflow-y: auto; flex: 1; }

/* Toast de éxito */
.cf-toast {
  position: fixed; left: 50%; bottom: calc(90px + env(safe-area-inset-bottom, 0px));
  transform: translateX(-50%);
  background: var(--olive); color: var(--paper);
  padding: 12px 20px; border-radius: 999px;
  font-family: var(--sans); font-size: 15px; font-weight: 500;
  box-shadow: 0 6px 20px rgba(0,0,0,0.18); z-index: 200;
  display: inline-flex; align-items: center; gap: 8px;
  animation: cf-toast-in 0.2s ease;
}
@keyframes cf-toast-in { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }

/* Fila de dato (un dato por línea) */
.cf-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0; border-bottom: 1px solid var(--rule-soft); gap: 12px;
}
.cf-row:last-child { border-bottom: none; }

/* Aviso de versión de prueba */
.cf-notice {
  background: var(--amber-wash); border: 1px solid var(--amber);
  border-radius: var(--r-sm); padding: 12px 14px;
  font-family: var(--sans); font-size: 14px; color: var(--ink-1); line-height: 1.45;
}

/* Pill segmentado para tipos */
.cf-seg { display: flex; flex-wrap: wrap; gap: 8px; }
.cf-seg-opt {
  flex: 1; min-width: 80px; min-height: 52px; padding: 8px 12px;
  background: var(--paper-card); border: 1.5px solid var(--rule);
  border-radius: var(--r-sm); cursor: pointer;
  font-family: var(--sans); font-size: 15px; color: var(--ink-1);
  display: inline-flex; align-items: center; justify-content: center; text-align: center;
}
.cf-seg-opt.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

</head>

  <script type="text/babel" data-presets="react">
/* ============================================================
   PERSISTENCIA — todo vive en el teléfono (localStorage)
   No hay servidor. No hay nube. No hay cuentas con contraseña.
   ============================================================ */

const STORAGE_KEY = 'novuscampo_cuaderno_v1';

// Lee todo el cuaderno desde localStorage. Si no existe, devuelve estructura vacía.
function leerCuaderno() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return estructuraVacia();
    const data = JSON.parse(raw);
    // Garantiza que todas las colecciones existan aunque falten en datos viejos
    return { ...estructuraVacia(), ...data };
  } catch (e) {
    // Si los datos están corruptos, no se pierde la app: arranca vacía.
    return estructuraVacia();
  }
}

// Estructura inicial del cuaderno — todas las listas arrancan vacías.
function estructuraVacia() {
  return {
    finca: null,           // { productor, finca, estado } — null hasta que registre
    animales: [],          // { id, chapeta, sexo, raza, edad, peso, estado, nota, eventos: [] }
    pendientes: [],        // { id, texto, fecha, hecho }
    sanidad: [],           // { id, nombre, tipo, cantidad, vence }
    inventario: [],        // { id, nombre, cantidad, unidad, umbral }
    potreros: [],          // { id, nombre, estado, dias }
  };
}

// Hook propio: estado React + persistencia automática en localStorage.
// Cada vez que cambia el estado, se guarda. Al abrir la app, se lee.
function useCuaderno() {
  const [data, setData] = React.useState(leerCuaderno);
  // errorGuardado avisa si el teléfono se quedó sin espacio (típicamente por fotos).
  const [errorGuardado, setErrorGuardado] = React.useState(false);

  // Guarda en el teléfono cada vez que 'data' cambia.
  React.useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      setErrorGuardado(false);
    } catch (e) {
      // El almacenamiento del teléfono se llenó (suele pasar con muchas fotos).
      // No silenciamos el error: avisamos para que el usuario libere espacio
      // (borrar fotos de animales viejos) y no pierda datos sin saberlo.
      setErrorGuardado(true);
    }
  }, [data]);

  return [data, setData, errorGuardado];
}

// Genera un id único simple (suficiente para uso local en un teléfono).
function nuevoId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

/* ============================================================
   HELPERS DE FECHA — todo en español, formato venezolano simple
   ============================================================ */

// Fecha de hoy a medianoche (para comparar vencimientos sin la hora).
function hoy() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  return d;
}

// Convierte "2026-05-20" a un objeto Date a medianoche local.
function aFecha(iso) {
  if (!iso) return null;
  const [a, m, d] = iso.split('-').map(Number);
  return new Date(a, m - 1, d);
}

// Días desde hoy hasta la fecha dada (negativo = ya pasó).
function diasHasta(iso) {
  const f = aFecha(iso);
  if (!f) return null;
  return Math.round((f - hoy()) / 86400000);
}

// Texto amable de cuándo vence/venció algo.
function textoVencimiento(iso) {
  const d = diasHasta(iso);
  if (d === null) return '';
  if (d < 0) return `venció hace ${Math.abs(d)} ${Math.abs(d) === 1 ? 'día' : 'días'}`;
  if (d === 0) return 'vence hoy';
  if (d === 1) return 'vence mañana';
  if (d <= 30) return `vence en ${d} días`;
  return `vence ${formatoFechaCorta(iso)}`;
}

// "2026-05-20" → "20 may"
function formatoFechaCorta(iso) {
  const f = aFecha(iso);
  if (!f) return '';
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${f.getDate()} ${meses[f.getMonth()]}`;
}

// Fecha de hoy en formato ISO (para prellenar inputs date).
function hoyISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

// Comprime una imagen a JPEG pequeño (~máx 800px, calidad 70%) usando canvas.
// Esto evita llenar el almacenamiento del teléfono: una foto de 3 MB queda en ~100 KB.
function comprimirImagen(file, callback) {
  const lector = new FileReader();
  lector.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const maxLado = 800;
      let { width, height } = img;
      if (width > height && width > maxLado) {
        height = Math.round(height * maxLado / width);
        width = maxLado;
      } else if (height > maxLado) {
        width = Math.round(width * maxLado / height);
        height = maxLado;
      }
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      // toDataURL con calidad 0.7 da buena relación tamaño/nitidez para fotos de ganado.
      callback(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.src = e.target.result;
  };
  lector.readAsDataURL(file);
}

        texto: `${i.nombre}: queda poco (${i.cantidad} ${i.unidad || ''})`.trim(),
        cat: 'Inventario',

  // Pendientes vencidos.

  // Alterna un animal en la selección.
  const alternarSeleccion = (id) => {
    setSeleccion(sel => sel.includes(id) ? sel.filter(x => x !== id) : [...sel, id]);
  };

  // Sale del modo selección y limpia.
  const salirSeleccion = () => { setSeleccionando(false); setSeleccion([]); };

  const animalesSeleccionados = data.animales.filter(a => seleccion.includes(a.id));

  // Al tocar una tarjeta: abre el animal, o lo (de)selecciona si estamos en modo selección.
  const tocarAnimal = (id) => {
    if (seleccionando) alternarSeleccion(id);
    else onAbrirAnimal(id);
  };

    <React.Fragment>

            titulo="Aún no tienes animales"
            texto="Toca + Agregar para registrar el primero de tu rebaño."
          />
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {/* Barra superior: contador + botón para entrar a modo selección */}
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 2 }}>
              <span className="cf-meta">
                {seleccionando
                  ? `${seleccion.length} seleccionado${seleccion.length === 1 ? '' : 's'}`
                  : `${data.animales.length} en el rebaño`}
              </span>
              {!seleccionando && (
                <button onClick={() => setSeleccionando(true)}
                  className="cf-meta" style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--terra)', textDecoration: 'underline', padding: 0 }}>
                  Seleccionar para PDF
                </button>
              )}
            </div>

            {data.animales.map(a => {
              const elegido = seleccion.includes(a.id);
              return (
                <button key={a.id} className="cf-card" onClick={() => tocarAnimal(a.id)}
                  style={{ padding: 14, display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer', textAlign: 'left',
                    border: elegido ? '2px solid var(--terra)' : '1px solid var(--rule-soft)' }}>
                  {/* Casilla de selección (solo en modo selección) */}
                  {seleccionando && (
                    <span style={{ width: 24, height: 24, borderRadius: 'var(--r-xs)', flexShrink: 0,
                      border: `1.5px solid ${elegido ? 'var(--terra)' : 'var(--rule)'}`,
                      background: elegido ? 'var(--terra)' : 'transparent',
                      display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
                      {elegido && <svg width="15" height="15" viewBox="0 0 16 16"><path d="M3 8l3 3 7-8" stroke="var(--paper)" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                    </span>
                  )}
                  {a.foto ? (
                    <img src={a.foto} alt="" style={{ width: 52, height: 52, borderRadius: 'var(--r-sm)', objectFit: 'cover', flexShrink: 0, border: '1px solid var(--rule-soft)' }} />
                  ) : (
                    <div className="cf-ph" style={{ width: 52, height: 52, borderRadius: 'var(--r-sm)', flexShrink: 0 }}>
                      {a.chapeta ? <span className="cf-num" style={{ fontSize: 13, color: 'var(--ink-2)' }}>{a.chapeta}</span> : ''}
                    </div>
                  )}
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span className="cf-num cf-meta" style={{ color: 'var(--ink-3)' }}>#{a.chapeta || '—'}</span>

                    </div>
                    <div style={{ fontFamily: 'var(--serif)', fontSize: 17, marginTop: 2 }}>{a.raza} · {a.sexo}</div>

                  </div>

                  )}

              );

      {seleccionando && seleccion.length > 0 && (

// Chip de estado del animal con color semántico.

function PantallaAnimal({ data, setData, animalId, onVolver }) {

/* ============================================================
   ANOTAR — registrar un evento real asociado a un animal
   ============================================================ */

function PantallaAnotar({ data, setData, onIrA }) {
  const [tipo, setTipo] = React.useState('Vacuna');
  const [animalId, setAnimalId] = React.useState('');
  const [detalle, setDetalle] = React.useState('');
  const [fecha, setFecha] = React.useState(hoyISO());
  const [toast, setToast] = React.useState('');

  const sinAnimales = data.animales.length === 0;
  const puedeGuardar = animalId && tipo;

  const guardar = () => {
    const evento = { tipo, detalle: detalle.trim(), fecha };
    setData(d => ({
      ...d,
      animales: d.animales.map(a =>
        a.id === animalId ? { ...a, eventos: [...a.eventos, evento] } : a
      ),
    }));
    // Algunos eventos cambian el estado del animal automáticamente.
    if (tipo === 'Enfermedad') ajustarEstado(animalId, 'En tratamiento');
    if (tipo === 'Parto') ajustarEstado(animalId, 'Lactando');
    if (tipo === 'Muerte') ajustarEstado(animalId, 'Para venta'); // marca para que el productor lo gestione

    setToast('Listo, se guardó');
    setTimeout(() => { setToast(''); onIrA('rebano'); }, 1200);
    setDetalle('');
  };

  const ajustarEstado = (id, estado) => {
    setData(d => ({ ...d, animales: d.animales.map(a => a.id === id ? { ...a, estado } : a) }));
  };

  return (
    <React.Fragment>
      <Cabecera titulo="Anotar" />
      <div className="cf-scroll" style={{ padding: '20px 18px 0' }}>
        {sinAnimales ? (
          <Vacio
            icono={<svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>}
            titulo="Primero agrega un animal"
            texto="Los eventos se anotan sobre un animal de tu rebaño. Agrega el primero en la pestaña Rebaño."
          />
        ) : (
          <React.Fragment>
            <h1 className="cf-h1" style={{ marginBottom: 20 }}>Anotar evento</h1>

            <Campo label="Tipo de evento">
              <div className="cf-seg">
                {TIPOS_EVENTO.map(t => (
                  <button key={t} className={'cf-seg-opt' + (tipo === t ? ' active' : '')}
                    onClick={() => setTipo(t)} style={{ minWidth: 90 }}>{t}</button>
                ))}
              </div>
            </Campo>

            <Campo label="¿Cuál animal?">
              <select className="cf-select" value={animalId} onChange={e => setAnimalId(e.target.value)}>
                <option value="">Seleccionar…</option>
                {data.animales.map(a => (
                  <option key={a.id} value={a.id}>
                    #{a.chapeta || '—'} · {a.raza} {a.sexo}
                  </option>
                ))}
              </select>
            </Campo>

            <Campo label="Detalle">
              <input className="cf-input" value={detalle} onChange={e => setDetalle(e.target.value)}
                placeholder={
                  tipo === 'Vacuna' ? 'Ej: Aftosa' :
                  tipo === 'Peso' ? 'Ej: 340 kg' :
                  tipo === 'Parto' ? 'Ej: hembra sana' :
                  'Detalle del evento'
                }
                inputMode={tipo === 'Peso' ? 'numeric' : 'text'} />
            </Campo>

            <Campo label="Fecha">
              <input className="cf-input" type="date" value={fecha} onChange={e => setFecha(e.target.value)} />
            </Campo>

            <button className="cf-btn" disabled={!puedeGuardar}
              style={{ opacity: puedeGuardar ? 1 : 0.5, marginBottom: 24 }}
              onClick={guardar}>Guardar evento</button>
          </React.Fragment>
        )}
      </div>
      {toast && <Toast texto={toast} />}
    </React.Fragment>
  );
}

/* ============================================================
   PENDIENTES — tareas reales con vencidos y próximos
   ============================================================ */

// Arma un mensaje de texto con los pendientes activos y abre WhatsApp.
// Funciona 100% (texto plano vía wa.me) en móvil y escritorio.
function compartirPendientesWhatsApp(vencidos, proximos) {
  const lineas = ['*Pendientes de la finca*', ''];
  if (vencidos.length > 0) {
    lineas.push('Vencidos:');
    vencidos.forEach(p => lineas.push(`- ${p.texto} (${textoVencimiento(p.fecha)})`));
    lineas.push('');
  }
  if (proximos.length > 0) {
    lineas.push('Próximos:');
    proximos.forEach(p => {
      const cuando = p.fecha ? ` (${textoVencimiento(p.fecha)})` : '';
      lineas.push(`- ${p.texto}${cuando}`);
    });
  }
  const texto = lineas.join('\n').trim();
  // wa.me abre WhatsApp con el texto ya escrito; el usuario elige a quién enviarlo.
  const url = 'https://wa.me/?text=' + encodeURIComponent(texto);
  window.open(url, '_blank');
}

function PantallaPendientes({ data, setData }) {
  const [form, setForm] = React.useState(false);
  const [texto, setTexto] = React.useState('');
  const [fecha, setFecha] = React.useState(hoyISO());
  const [toast, setToast] = React.useState('');

  const agregar = () => {
    if (!texto.trim()) return;
    setData(d => ({ ...d, pendientes: [...d.pendientes, { id: nuevoId(), texto: texto.trim(), fecha, hecho: false }] }));
    setTexto(''); setFecha(hoyISO()); setForm(false);
    setToast('Listo, se guardó'); setTimeout(() => setToast(''), 1500);
  };

  const alternar = (id) => {
    setData(d => ({ ...d, pendientes: d.pendientes.map(p => p.id === id ? { ...p, hecho: !p.hecho } : p) }));
  };

  const borrar = (id) => {
    setData(d => ({ ...d, pendientes: d.pendientes.filter(p => p.id !== id) }));
  };

  const activos = data.pendientes.filter(p => !p.hecho);
  const vencidos = activos.filter(p => { const dd = diasHasta(p.fecha); return dd !== null && dd < 0; });
  const proximos = activos.filter(p => { const dd = diasHasta(p.fecha); return dd === null || dd >= 0; });
  const hechos = data.pendientes.filter(p => p.hecho);

  const Item = ({ p }) => {
    const dd = diasHasta(p.fecha);
    const vencido = dd !== null && dd < 0 && !p.hecho;
    return (
      <div className="cf-card" style={{ padding: 14, display: 'flex', alignItems: 'center', gap: 12, marginBottom: 8 }}>

          background: p.hecho ? 'var(--olive)' : 'transparent',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          {p.hecho && <svg width="16" height="16" viewBox="0 0 16 16"><path d="M3 8l3 3 7-8" stroke="var(--paper)" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
        </button>
        <div style={{ flex: 1 }}>
          <div className="cf-body" style={{ fontSize: 16, textDecoration: p.hecho ? 'line-through' : 'none', color: p.hecho ? 'var(--ink-3)' : 'var(--ink-1)' }}>{p.texto}</div>
          <div className="cf-meta" style={{ marginTop: 2, color: vencido ? 'var(--crimson)' : 'var(--ink-3)' }}>
            {textoVencimiento(p.fecha)}
          </div>
        </div>
        <button onClick={() => borrar(p.id)} style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: 6, flexShrink: 0 }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="var(--ink-3)" strokeWidth="1.6" strokeLinecap="round"/></svg>
        </button>
      </div>
    );
  };

  return (
    <React.Fragment>
      <Cabecera titulo="Pendientes" accion={

    const fecha = hoyISO();
    a.href = url;
    a.download = `cuaderno-${data.finca.finca.toLowerCase().replace(/\s+/g, '-')}-${fecha}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    mostrarToast('Respaldo descargado');
  };

  // Borra TODO y vuelve al onboarding.
  const borrarTodo = () => {
    localStorage.removeItem(STORAGE_KEY);
    onReset();
  };

  return (
    <SubPantalla titulo="Ajustes" onVolver={onVolver}>
      {/* Datos de la finca */}
      <span className="cf-eyebrow" style={{ display: 'block', marginBottom: 12 }}>Tu finca</span>
      <div className="cf-card" style={{ padding: '4px 16px', marginBottom: 22 }}>
        <div className="cf-row">
          <span className="cf-meta">Productor</span>
          <span className="cf-body" style={{ fontWeight: 500 }}>{data.finca.productor}</span>
        </div>
        <div className="cf-row">
          <span className="cf-meta">Finca</span>
          <span className="cf-body" style={{ fontWeight: 500 }}>{data.finca.finca}</span>
        </div>

      </div>
      <button className="cf-btn cf-btn--ghost" style={{ marginBottom: 28 }} onClick={() => setEditFinca(true)}>Editar datos de la finca</button>

      {/* Respaldo */}
      <span className="cf-eyebrow" style={{ display: 'block', marginBottom: 12 }}>Tus datos</span>
      <div className="cf-notice" style={{ marginBottom: 16 }}>
        Versión de prueba — tus datos se guardan solo en este teléfono. Si borras el caché del navegador o cambias de equipo, se pierden. Por eso conviene exportar un respaldo de vez en cuando.
      </div>
      <button className="cf-btn cf-btn--ink" style={{ marginBottom: 12 }} onClick={exportar}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3v12M7 10l5 5 5-5M5 21h14" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
        Exportar mis datos
      </button>
      <button className="cf-btn cf-btn--ghost" style={{ marginBottom: 28, color: 'var(--crimson)', borderColor: 'var(--crimson)' }} onClick={() => setConfirmarBorrar(true)}>
        Borrar todo
      </button>

      {/* Resumen de lo guardado */}
      <span className="cf-eyebrow" style={{ display: 'block', marginBottom: 12 }}>Resumen</span>
      <div className="cf-card" style={{ padding: '4px 16px', marginBottom: 28 }}>
        {[
          ['Animales', data.animales.length],
          ['Pendientes', data.pendientes.length],
          ['Sanidad', data.sanidad.length],
          ['Inventario', data.inventario.length],
          ['Potreros', data.potreros.length],
        ].map(([k, v]) => (
          <div key={k} className="cf-row">
            <span className="cf-meta">{k}</span>
            <span className="cf-num" style={{ fontSize: 16 }}>{v}</span>
          </div>
        ))}
      </div>

      {/* Marca */}
      <div style={{ textAlign: 'center', marginBottom: 24, opacity: 0.6 }}>
        <span className="cf-diamond" style={{ fontSize: 16 }}>◆</span>
        <div className="cf-meta" style={{ marginTop: 6 }}>Novuscampo · Cuaderno de finca</div>
        <div className="cf-meta" style={{ marginTop: 2, color: 'var(--ink-4)' }}>versión de prueba</div>
      </div>

      {editFinca && <FormFinca finca={data.finca} onGuardar={(f) => { setData(d => ({ ...d, finca: f })); setEditFinca(false); mostrarToast('Listo, se guardó'); }} onCerrar={() => setEditFinca(false)} />}
      {confirmarBorrar && <Confirmar
        titulo="¿Borrar todo?"
        texto="Se borrarán todos tus datos de este teléfono: animales, eventos, pendientes, sanidad, inventario y potreros. Esto no se puede deshacer. Si quieres conservarlos, exporta un respaldo primero."
        textoSi="Sí, borrar todo"
        onSi={borrarTodo} onNo={() => setConfirmarBorrar(false)} />}
      {toast && <Toast texto={toast} />}
    </SubPantalla>
  );
}

// Formulario para editar datos de la finca.
function FormFinca({ finca, onGuardar, onCerrar }) {
  const [f, setF] = React.useState(finca);
  return (
    <Hoja titulo="Editar finca" onCerrar={onCerrar}>
      <Campo label="Tu nombre"><input className="cf-input" value={f.productor} onChange={e => setF({ ...f, productor: e.target.value })} /></Campo>
      <Campo label="Nombre de la finca"><input className="cf-input" value={f.finca} onChange={e => setF({ ...f, finca: e.target.value })} /></Campo>
      <button className="cf-btn" onClick={() => onGuardar(f)}>Guardar</button>
    </Hoja>
  );
}

// Diálogo para elegir opciones de exportación de PDF y compartir/descargar.
function DialogoExportar({ animales, finca, onCerrar, onResultado }) {
  const [porPagina, setPorPagina] = React.useState(animales.length === 1 ? 1 : 2);
  const [incluirSanidad, setIncluirSanidad] = React.useState(true);
  const [generando, setGenerando] = React.useState(false);

  const exportar = () => {
    setGenerando(true);
    // Pequeño delay para que el "Generando…" se vea antes del trabajo pesado.
    setTimeout(() => {
      generarPDFAnimales(animales, finca, { porPagina, incluirSanidad }, (blob) => {
        const nombre = animales.length === 1
          ? `animal-${(animales[0].chapeta || 's-n').toString().replace(/\s+/g, '')}.pdf`
          : `animales-${finca.finca.toLowerCase().replace(/\s+/g, '-')}.pdf`;
        compartirPDF(blob, nombre, (res) => {
          setGenerando(false);
          onResultado(res);
        });
      });
    }, 60);
  };

  return (
    <Hoja titulo={animales.length === 1 ? 'Exportar animal' : `Exportar ${animales.length} animales`} onCerrar={onCerrar}>
      <p className="cf-body" style={{ marginTop: 0, marginBottom: 20, color: 'var(--ink-2)' }}>
        Genera una ficha PDF limpia para compartir con compradores por WhatsApp.
      </p>

      {animales.length > 1 && (
        <Campo label="Formato">
          <div className="cf-seg">
            <button className={'cf-seg-opt' + (porPagina === 1 ? ' active' : '')} onClick={() => setPorPagina(1)}>
              Una ficha por hoja
            </button>
            <button className={'cf-seg-opt' + (porPagina === 2 ? ' active' : '')} onClick={() => setPorPagina(2)}>
              Dos por hoja
            </button>
          </div>
        </Campo>
      )}

      <Campo label="Información sanitaria">
        <button className={'cf-seg-opt' + (incluirSanidad ? ' active' : '')} onClick={() => setIncluirSanidad(!incluirSanidad)}
          style={{ width: '100%', justifyContent: 'flex-start', gap: 10 }}>
          <span style={{ width: 22, height: 22, borderRadius: 4, flexShrink: 0, border: `1.5px solid ${incluirSanidad ? 'var(--paper)' : 'var(--rule)'}`, background: incluirSanidad ? 'var(--paper)' : 'transparent', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
            {incluirSanidad && <svg width="14" height="14" viewBox="0 0 16 16"><path d="M3 8l3 3 7-8" stroke="var(--ink)" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </span>
          Incluir vacunas registradas
        </button>
      </Campo>

      <button className="cf-btn" onClick={exportar} disabled={generando} style={{ marginTop: 4 }}>
        {generando ? 'Generando…' : (
          <React.Fragment>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 12v6a2 2 0 002 2h12a2 2 0 002-2v-6M12 3v12M8 11l4 4 4-4" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
            Generar y compartir PDF
          </React.Fragment>
        )}
      </button>
      <p className="cf-meta" style={{ marginTop: 12, color: 'var(--ink-3)', textAlign: 'center', lineHeight: 1.5 }}>
        En el teléfono se abrirá el menú para compartir por WhatsApp.<br/>En computadora se descarga el archivo.
      </p>
    </Hoja>
  );
}

/* ============================================================
   GENERACIÓN DE PDF — fichas de animales para vender por WhatsApp
   Usa jsPDF (cargada desde CDN). Diseño limpio, no corporativo.
   ============================================================ */

// Paleta de marca en RGB para jsPDF.
const PDF_COLORES = {
  ink: [28, 24, 20],
  ink2: [107, 95, 78],
  ink3: [150, 138, 118],
  terra: [139, 58, 44],
  paper: [244, 236, 219],
  paperCard: [251, 246, 234],
  rule: [212, 198, 164],
  olive: [90, 100, 64],
};

// Genera un PDF con una o varias fichas de animales.
// opciones: { porPagina: 1 | 2, incluirSanidad: bool }
function generarPDFAnimales(animales, finca, opciones, callback) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const anchoPag = 210;
  const altoPag = 297;
  const margen = 16;
  const unaPorPagina = opciones.porPagina === 1;

  // Altura de cada ficha según el modo.
  const altoFicha = unaPorPagina ? (altoPag - margen * 2) : (altoPag - margen * 2 - 8) / 2;

  animales.forEach((animal, idx) => {
    const posEnPagina = unaPorPagina ? 0 : (idx % 2);
    if (idx > 0 && posEnPagina === 0) doc.addPage();

    const y0 = margen + posEnPagina * (altoFicha + 8);
    dibujarFicha(doc, animal, finca, opciones, margen, y0, anchoPag - margen * 2, altoFicha, unaPorPagina);
  });

  // Devuelve el PDF como Blob para compartir o descargar.
  const blob = doc.output('blob');
  callback(blob, doc);
}

// Dibuja una ficha individual de animal en el PDF.
function dibujarFicha(doc, animal, finca, opciones, x, y, ancho, alto, grande) {
  const C = PDF_COLORES;

  // Marco de la ficha.
  doc.setDrawColor(...C.rule);
  doc.setLineWidth(0.3);
  doc.roundedRect(x, y, ancho, alto, 3, 3, 'S');

  // Cabecera: marca + finca.
  doc.setFont('helvetica', 'italic');
  doc.setFontSize(grande ? 16 : 13);
  doc.setTextColor(...C.terra);
  doc.text('Novuscampo', x + 8, y + 11);

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(grande ? 9 : 8);
  doc.setTextColor(...C.ink3);
  doc.text(`${finca.finca}`, x + ancho - 8, y + 11, { align: 'right' });

  // Línea bajo cabecera.
  doc.setDrawColor(...C.rule);
  doc.line(x + 8, y + 15, x + ancho - 8, y + 15);

  // Zona de foto (izquierda) + datos (derecha).
  const fotoLado = grande ? 70 : 42;
  const fotoX = x + 8;
  const fotoY = y + 20;

  if (animal.foto) {
    try {
      doc.addImage(animal.foto, 'JPEG', fotoX, fotoY, fotoLado, fotoLado, undefined, 'FAST');
    } catch (e) {
      dibujarPlaceholderFoto(doc, fotoX, fotoY, fotoLado, C);
    }
  } else {
    dibujarPlaceholderFoto(doc, fotoX, fotoY, fotoLado, C);
  }

  // Datos a la derecha de la foto.
  const datosX = fotoX + fotoLado + 8;
  let cursorY = fotoY + 4;

  // Chapeta grande.
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(grande ? 22 : 15);
  doc.setTextColor(...C.ink);
  doc.text(`#${animal.chapeta || '—'}`, datosX, cursorY + 4);
  cursorY += grande ? 11 : 8;

  // Raza · sexo.
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(grande ? 13 : 10);
  doc.setTextColor(...C.ink2);
  doc.text(`${animal.raza} · ${animal.sexo}`, datosX, cursorY + 2);
  cursorY += grande ? 9 : 7;

  // Tabla de datos clave.
  const datos = [
    ['Edad', animal.edad || '—'],
    ['Peso', animal.peso ? `${animal.peso} kg` : '—'],
    ['Estado', animal.estado || '—'],
  ];
  doc.setFontSize(grande ? 10 : 8.5);
  datos.forEach(([k, v]) => {
    doc.setTextColor(...C.ink3);
    doc.text(k, datosX, cursorY + 2);
    doc.setTextColor(...C.ink);
    doc.text(String(v), datosX + (grande ? 26 : 20), cursorY + 2);
    cursorY += grande ? 7 : 5.5;
  });

  // Nota / observaciones (debajo de la foto si es grande, o sigue en columna).
  let notaY = grande ? (fotoY + fotoLado + 8) : (y + alto - 22);
  if (animal.nota) {
    doc.setDrawColor && doc.setDrawColor(...C.rule);
    doc.setFont('helvetica', 'italic');
    doc.setFontSize(grande ? 10 : 8);
    doc.setTextColor(...C.ink2);
    const notaTexto = doc.splitTextToSize(`"${animal.nota}"`, ancho - 16);
    doc.text(notaTexto.slice(0, grande ? 3 : 2), x + 8, notaY);
    notaY += (grande ? 3 : 2) * (grande ? 5 : 4);
  }

  // Información sanitaria (si se pidió y hay eventos de vacuna/sanidad).
  if (opciones.incluirSanidad) {
    const sanitarios = (animal.eventos || []).filter(ev =>
      ['Vacuna', 'Enfermedad'].includes(ev.tipo));
    if (sanitarios.length > 0) {
      const sanidadY = grande ? notaY + 4 : (y + alto - 16);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(grande ? 9 : 7.5);
      doc.setTextColor(...C.olive);
      doc.text('SANIDAD', x + 8, sanidadY);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(...C.ink2);
      const ultimos = sanitarios.slice(-3).reverse();
      let sy = sanidadY + (grande ? 5 : 4);
      ultimos.forEach(ev => {
        const linea = `${ev.tipo}: ${ev.detalle || '—'} (${formatoFechaCorta(ev.fecha)})`;
        doc.text(linea, x + 8, sy);
        sy += grande ? 5 : 4;
      });
    }
  }

  // Pie: fecha de generación.
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(7);
  doc.setTextColor(...C.ink3);
  doc.text(`Ficha generada ${formatoFechaCorta(hoyISO())}`, x + ancho - 8, y + alto - 5, { align: 'right' });
}

// Dibuja un recuadro gris cuando el animal no tiene foto.
function dibujarPlaceholderFoto(doc, x, y, lado, C) {
  doc.setFillColor(236, 225, 198);
  doc.setDrawColor(...C.rule);
  doc.roundedRect(x, y, lado, lado, 2, 2, 'FD');
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(...C.ink3);
  doc.text('sin foto', x + lado / 2, y + lado / 2, { align: 'center' });
}

// Comparte el PDF: usa el menú nativo del teléfono (Web Share) si está disponible,
// o descarga el archivo como respaldo.
function compartirPDF(blob, nombreArchivo, onResultado) {
  const file = new File([blob], nombreArchivo, { type: 'application/pdf' });

  // Web Share API con archivos — disponible en la mayoría de teléfonos modernos.
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({
      files: [file],
      title: 'Ficha de animales · Novuscampo',
    }).then(() => onResultado('compartido'))
      .catch(() => onResultado('cancelado'));
  } else {
    // Respaldo: descargar el archivo. El productor lo adjunta manualmente.
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = nombreArchivo;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    onResultado('descargado');
  }
}

/* ============================================================
   APP — router principal + estado global del cuaderno
   ============================================================ */

function App() {
  const [data, setData, errorGuardado] = useCuaderno();
  const [tab, setTab] = React.useState('inicio');     // pestaña activa de la barra
  const [vista, setVista] = React.useState(null);      // sub-vista (animal, sanidad, etc.) o null
  const [animalAbierto, setAnimalAbierto] = React.useState(null);

  // Si no hay finca registrada, mostramos el onboarding.
  const [pasoOnb, setPasoOnb] = React.useState('bienvenida'); // bienvenida → registro

  // ¿Ya tiene finca? Si no, onboarding.
  if (!data.finca) {
    if (pasoOnb === 'bienvenida') {
      return (
        <div className="cf-app">
          <Bienvenida onEmpezar={() => setPasoOnb('registro')} />
        </div>
      );
    }
    return (
      <div className="cf-app">
        <Registro onCrear={(finca) => setData(d => ({ ...d, finca }))} />
      </div>
    );
  }

  // Reset completo: vuelve al onboarding tras borrar todo.
  const reset = () => {
    setData(estructuraVacia());
    setTab('inicio'); setVista(null); setPasoOnb('bienvenida');
  };

  // Navegación entre pestañas y sub-vistas.
  const irA = (destino) => {
    if (['inicio', 'rebano', 'anotar', 'pendientes', 'mas'].includes(destino)) {
      setTab(destino); setVista(null); setAnimalAbierto(null);
    } else {
      setVista(destino); // sanidad, inventario, potreros, ajustes
    }
  };

  // ¿Qué pantalla mostramos en el área de contenido?
  let contenido;
  if (animalAbierto) {
    contenido = <PantallaAnimal data={data} setData={setData} animalId={animalAbierto} onVolver={() => setAnimalAbierto(null)} />;
  } else if (vista === 'sanidad') {
    contenido = <PantallaSanidad data={data} setData={setData} onVolver={() => setVista(null)} />;
  } else if (vista === 'inventario') {
    contenido = <PantallaInventario data={data} setData={setData} onVolver={() => setVista(null)} />;
  } else if (vista === 'potreros') {
    contenido = <PantallaPotreros data={data} setData={setData} onVolver={() => setVista(null)} />;
  } else if (vista === 'ajustes') {
    contenido = <PantallaAjustes data={data} setData={setData} onVolver={() => setVista(null)} onReset={reset} />;
  } else if (tab === 'inicio') {
    contenido = <PantallaInicio data={data} onIrA={irA} />;
  } else if (tab === 'rebano') {
    contenido = <PantallaRebano data={data} setData={setData} onAbrirAnimal={setAnimalAbierto} />;
  } else if (tab === 'anotar') {
    contenido = <PantallaAnotar data={data} setData={setData} onIrA={irA} />;
  } else if (tab === 'pendientes') {
    contenido = <PantallaPendientes data={data} setData={setData} />;
  } else if (tab === 'mas') {
    contenido = <PantallaMas data={data} onIrA={irA} />;
  }

  // La barra inferior se oculta dentro de sub-vistas con su propio "volver".
  const mostrarBarra = !animalAbierto && !vista;

  return (
    <div className="cf-app">
      {errorGuardado && (
        <div style={{
          position: 'absolute', top: 0, left: 0, right: 0, zIndex: 300,
          background: 'var(--crimson)', color: 'var(--paper)',
          padding: 'calc(env(safe-area-inset-top, 0px) + 12px) 16px 12px',
          fontFamily: 'var(--sans)', fontSize: 14, lineHeight: 1.4, textAlign: 'center',
        }}>
          El teléfono se quedó sin espacio. Borra fotos de animales viejos para
          poder seguir guardando.
        </div>
      )}
      {contenido}
      {mostrarBarra && <BarraNav activa={tab} onCambiar={irA} />}
    </div>
  );
}

// Monta la app.
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
